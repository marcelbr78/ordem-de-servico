# ╔══════════════════════════════════════════════════════════════╗
# ║  Nginx — Proxy reverso OS4U                                 ║
# ║  Substitua SEU_DOMINIO.com.br pelo domínio real             ║
# ╚══════════════════════════════════════════════════════════════╝

user nginx;
worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # Logs
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent"';
    access_log /var/log/nginx/access.log main;

    # Performance
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    client_max_body_size 50M;   # uploads de fotos/PDFs

    # Gzip
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml application/x-font-ttf image/svg+xml;

    # ─── Redirecionar HTTP → HTTPS ─────────────────────────────
    server {
        listen 80;
        server_name SEU_DOMINIO.com.br www.SEU_DOMINIO.com.br;

        # Renovação Let's Encrypt
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─── HTTPS principal ───────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name SEU_DOMINIO.com.br www.SEU_DOMINIO.com.br;

        # Certificados SSL (gerados pelo Certbot ou comprados)
        ssl_certificate     /etc/nginx/ssl/live/SEU_DOMINIO.com.br/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/SEU_DOMINIO.com.br/privkey.pem;

        # Protocolos e cifras seguras
        ssl_protocols TLSv1.2 TLSv1.3;
        ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
        ssl_prefer_server_ciphers off;
        ssl_session_cache shared:SSL:10m;
        ssl_session_timeout 1d;
        ssl_stapling on;
        ssl_stapling_verify on;

        # Headers de segurança
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "no-referrer-when-downgrade" always;
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # ── API Backend (/api/*) ────────────────────────────────
        location /api/ {
            rewrite ^/api(/.*)$ $1 break;
            proxy_pass http://os4u_backend:3005;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_cache_bypass $http_upgrade;
            proxy_read_timeout 300s;
            proxy_connect_timeout 75s;
        }

        # ── Frontend React ──────────────────────────────────────
        location / {
            proxy_pass http://os4u_frontend:80;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # ─── API em subdomínio separado (opcional) ─────────────────
    # Se preferir api.SEU_DOMINIO.com.br em vez de /api
    server {
        listen 443 ssl http2;
        server_name api.SEU_DOMINIO.com.br;

        ssl_certificate     /etc/nginx/ssl/live/SEU_DOMINIO.com.br/fullchain.pem;
        ssl_certificate_key /etc/nginx/ssl/live/SEU_DOMINIO.com.br/privkey.pem;
        ssl_protocols TLSv1.2 TLSv1.3;

        location / {
            proxy_pass http://os4u_backend:3005;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection 'upgrade';
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 300s;
        }
    }
}
