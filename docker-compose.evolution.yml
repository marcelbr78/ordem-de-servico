# ╔══════════════════════════════════════════════════════════════╗
# ║  Evolution API v1.8.2 — OS4U Linux                         ║
# ║  Uso: docker compose -f docker-compose.evolution.yml up -d  ║
# ║  API: http://localhost:8080                                  ║
# ║  Publico: https://evolution.os4u.com.br                     ║
# ╚══════════════════════════════════════════════════════════════╝

services:

  # MongoDB (v1.8 usa Mongo, não PostgreSQL)
  evo_mongo:
    image: mongo:6
    container_name: evo_mongo
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: evo
      MONGO_INITDB_ROOT_PASSWORD: evo_pass_2026
      MONGO_INITDB_DATABASE: evolution
    volumes:
      - evo_mongo_data:/data/db
    networks:
      - evo_net

  evolution_api:
    image: atendai/evolution-api:v1.8.2
    container_name: evolution_api
    restart: unless-stopped
    depends_on:
      - evo_mongo
    ports:
      - '8080:8080'
    environment:
      - SERVER_URL=https://evolution.os4u.com.br
      - SERVER_PORT=8080
      - DOCKER_ENV=true
      - LOG_LEVEL=ERROR
      - DEL_INSTANCE=false

      # Banco MongoDB
      - DATABASE_ENABLED=true
      - DATABASE_PROVIDER=mongodb
      - DATABASE_CONNECTION_URI=mongodb://evo:evo_pass_2026@evo_mongo:27017/evolution?authSource=admin
      - DATABASE_CONNECTION_CLIENT_NAME=evolution-api

      # Auth
      - AUTHENTICATION_API_KEY=bluetv_evolution_key_2026
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true

      # QR Code
      - QRCODE_LIMIT=30
      - QRCODE_COLOR=#198754

      # WebSocket
      - WEBSOCKET_ENABLED=true
      - WEBSOCKET_GLOBAL_EVENTS=false

      # Storage
      - STORE_MESSAGES=true
      - STORE_MESSAGE_UP=true
      - STORE_CONTACTS=true
      - STORE_CHATS=true
    volumes:
      - evo_store:/evolution/store
      - evo_instances:/evolution/instances
    networks:
      - evo_net
      - os4u_net

volumes:
  evo_mongo_data:
  evo_store:
  evo_instances:

networks:
  evo_net:
    driver: bridge
  os4u_net:
    external: true
    name: os4u_os4u_net
