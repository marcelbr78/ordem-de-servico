version: '3.9'

services:
  postgres:
    image: postgres:15-alpine
    container_name: os4u_prod_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USERNAME:-os4u}
      POSTGRES_PASSWORD: ${DB_PASSWORD:?Defina DB_PASSWORD}
      POSTGRES_DB: ${DB_DATABASE:-assistencia_db}
    volumes:
      - os4u_prod_postgres_data:/var/lib/postgresql/data
    ports:
      - '127.0.0.1:5434:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U os4u']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - os4u_prod_net

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: os4u_prod_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - '127.0.0.1:3005:3005'
    environment:
      NODE_ENV: production
      PORT: 3005
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: ${DB_USERNAME:-os4u}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_DATABASE: ${DB_DATABASE:-assistencia_db}
      DB_SSL: "false"
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 7d
      FRONTEND_URL: ${FRONTEND_URL:-https://os4u.com.br}
      EVOLUTION_API_URL: ${EVOLUTION_API_URL}
      EVOLUTION_API_KEY: ${EVOLUTION_API_KEY}
    volumes:
      - os4u_prod_backend_logs:/app/logs
    networks:
      - os4u_prod_net

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # VITE API URL para Nginx roteamento igual no DEV
        VITE_API_URL: /api
    container_name: os4u_prod_frontend
    restart: unless-stopped
    depends_on:
      - backend
    networks:
      - os4u_prod_net

  nginx:
    image: nginx:1.25-alpine
    container_name: os4u_prod_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - '80:80'
    volumes:
      - ./nginx.prod.conf:/etc/nginx/nginx.conf:ro
    networks:
      - os4u_prod_net

volumes:
  os4u_prod_postgres_data:
  os4u_prod_backend_logs:

networks:
  os4u_prod_net:
    driver: bridge
