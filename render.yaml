# ╔══════════════════════════════════════════════════════════════╗
# ║  OS4U — Render.com                                          ║
# ║  Arquivo detectado automaticamente pelo Render               ║
# ╚══════════════════════════════════════════════════════════════╝

services:
  - type: web
    name: os4u-backend
    env: node
    region: oregon          # trocar para frankfurt se quiser mais próximo do BR
    plan: starter           # starter = $7/mês, nunca dorme (free dorme após 15min)
    rootDir: backend
    buildCommand: npm install --legacy-peer-deps && npm run build
    startCommand: npm run start
    healthCheckPath: /health

    envVars:
      - key: NODE_ENV
        value: production

      - key: NODE_VERSION
        value: 20

      - key: PORT
        value: 3005

      # ── Banco PostgreSQL (Render cria automaticamente) ────────
      - key: DB_HOST
        fromDatabase:
          name: os4u-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: os4u-db
          property: port
      - key: DB_USERNAME
        fromDatabase:
          name: os4u-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: os4u-db
          property: password
      - key: DB_DATABASE
        fromDatabase:
          name: os4u-db
          property: database

      # ── Auth ──────────────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true      # Render gera automaticamente
      - key: JWT_EXPIRES_IN
        value: 7d

      # ── CORS — URL do frontend no Cloudflare Pages ────────────
      # Preencher no dashboard do Render após ter a URL do CF Pages
      - key: FRONTEND_URL
        value: https://os4u.pages.dev   # trocar pelo seu domínio real

      # ── Opcionais — preencher no dashboard do Render ──────────
      - key: EVOLUTION_API_URL
        value: ""
      - key: EVOLUTION_API_KEY
        value: ""
      - key: EVOLUTION_INSTANCE_ID
        value: ""
      - key: SMTP_HOST
        value: ""
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        value: ""
      - key: SMTP_PASS
        value: ""
      - key: SMTP_FROM
        value: ""
      - key: CLOUDINARY_CLOUD_NAME
        value: ""
      - key: CLOUDINARY_API_KEY
        value: ""
      - key: CLOUDINARY_API_SECRET
        value: ""

# ── Banco de dados PostgreSQL ─────────────────────────────────
databases:
  - name: os4u-db
    region: oregon
    plan: starter             # $7/mês com backups automáticos
    # plan: free              # gratuito mas expira em 90 dias
